    <style>
      /* Custom scrollbar hiding and touch adjustments */
      body, html {
        width: 100%;
        height: 100%;
        overflow: hidden;
        overscroll-behavior: none;
        touch-action: none;
        background-color: #b0b5b1; /* Match bottom of gradient */
      }
      .no-select {
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
      }
      /* Hide Scrollbars */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .font-led {
        font-family: 'VT323', monospace;
      }
      .font-pixel {
        font-family: 'Press Start 2P', cursive;
      }
      @keyframes breathe-glow {
        0%, 100% {
          border-color: #78350f;
          box-shadow: 
            inset 0 2px 2px -1px rgba(255, 255, 255, 0.2),
            inset 0 -2px 3px -1px rgba(0, 0, 0, 0.8),
            inset 0 0 4px rgba(120, 53, 15, 0.6),
            0 1px 2px rgba(0,0,0,0.8),
            0 0 2px rgba(120, 53, 15, 0.5);
        }
        50% {
          border-color: #d97706;
          box-shadow: 
            inset 0 2px 2px -1px rgba(255, 255, 255, 0.35),
            inset 0 -2px 3px -1px rgba(0, 0, 0, 0.9),
            inset 0 0 8px rgba(217, 119, 6, 0.8),
            0 1px 2px rgba(0,0,0,0.8),
            0 0 10px rgba(217, 119, 6, 0.8);
        }
      }
      .animate-breathe-glow {
        animation: breathe-glow 2s ease-in-out infinite;
      }
      @keyframes breathe-glow-urgent {
        0%, 100% {
          border-color: #7f1d1d;
          box-shadow: 
            inset 0 2px 2px -1px rgba(255, 255, 255, 0.2),
            inset 0 -2px 3px -1px rgba(0, 0, 0, 0.8),
            inset 0 0 4px rgba(127, 29, 29, 0.6),
            0 1px 2px rgba(0,0,0,0.8),
            0 0 3px rgba(127, 29, 29, 0.5);
        }
        50% {
          border-color: #dc2626;
          box-shadow: 
            inset 0 2px 2px -1px rgba(255, 255, 255, 0.35),
            inset 0 -2px 3px -1px rgba(0, 0, 0, 0.9),
            inset 0 0 10px rgba(220, 38, 38, 0.8),
            0 1px 2px rgba(0,0,0,0.8),
            0 0 12px rgba(220, 38, 38, 0.9);
        }
      }
      .animate-breathe-glow-urgent {
        animation: breathe-glow-urgent 1s ease-in-out infinite;
      }
    </style>

  <body>
    <div id="root"></div>
    <!-- HBuilderX 5+ App 沉浸式支持 -->
    <script>
      document.addEventListener('plusready', function() {
        setTimeout(function() {
          if (window.plus && plus.navigator) {
            // 1. 强制全屏，隐藏顶部状态栏
            plus.navigator.setFullscreen(true);
            
            // 2. 隐藏底部虚拟按键/手势条 (真正的沉浸式全屏)
            if (plus.navigator.hideSystemNavigation) {
              plus.navigator.hideSystemNavigation();
            }
            
            // 3. 针对小米澎湃OS等深度定制系统的强制沉浸式设置
            if (plus.webview && plus.webview.currentWebview()) {
                var wv = plus.webview.currentWebview();
                wv.setStyle({
                    render: "always",
                    hardwareAccelerated: true,
                    background: "transparent",
                    titleNView: {
                        type: "transparent"
                    }
                });
            }
            
            // 4. 兜底设置：强制背景色
            if (plus.navigator.setNavigationBarBackground) {
              plus.navigator.setNavigationBarBackground('#b0b5b1');
            }
          }
        }, 50);
      }, false);
    </script>
  </body>
